<section id="services" style="background: var(--section-bg);">
  <div class="max-w-6xl mx-auto px-6 py-20 lg:py-24">
    <div class="text-center mb-14 fade-up">
      <span class="text-xs font-semibold uppercase tracking-[0.2em]" style="color: var(--accent);">{{ services.label }}</span>
      <h2 class="section-title mt-3 mb-4">{{ services.title }}</h2>
      <p class="text-lg" style="color: var(--text-muted); max-width: 560px; margin-left: auto; margin-right: auto;">{{ services.subtitle }}</p>
      <div class="gold-rule mx-auto mt-5"></div>
    </div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5 fade-up">
      {% for service in services.services %}
      <div class="service-card" style="background: var(--surface); padding: 2rem;">
        <div style="display: flex; align-items: center; gap: 0.875rem; margin-bottom: 1.25rem;">
          <div style="width: 2.5rem; height: 2px; background: var(--accent); flex-shrink: 0;"></div>
          <i data-lucide="{{ service.icon }}" style="width: 22px; height: 22px; color: var(--accent); flex-shrink: 0;"></i>
        </div>
        <h3 class="font-heading text-xl font-semibold mb-3" style="color: var(--text-dark);">{{ service.title }}</h3>
        <p class="text-sm mb-5" style="color: var(--text-muted); line-height: 1.7;">{{ service.description }}</p>
        <ul class="space-y-2.5">
          {% for feature in service.features %}
          <li class="flex items-center gap-2.5 text-sm" style="color: var(--text-muted);">
            <i data-lucide="check" style="width: 14px; height: 14px; color: var(--accent); flex-shrink: 0;"></i>
            {{ feature }}
          </li>
          {% endfor %}
        </ul>
      </div>
      {% endfor %}
    </div>
    <div class="mt-8 fade-up">
      <div style="background: var(--surface); padding: 1.25rem 2rem; border: 1px solid rgba(0,0,0,0.06); max-width: 700px; margin-left: auto; margin-right: auto;">
        <p class="text-sm text-center" style="color: var(--text-muted); line-height: 1.7;">{{ services.pricing_note }}</p>
      </div>
    </div>
  </div>
</section>
