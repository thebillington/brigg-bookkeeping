<section id="testimonials" style="background: var(--surface);">
  <div class="max-w-6xl mx-auto px-6 py-20 lg:py-24">
    <div class="text-center mb-14 fade-up">
      <span class="text-xs font-semibold uppercase tracking-[0.2em]" style="color: var(--accent);">{{ testimonials.label }}</span>
      <h2 class="section-title mt-3 mb-4">{{ testimonials.title }}</h2>
      <p class="text-lg" style="color: var(--text-muted); max-width: 560px; margin-left: auto; margin-right: auto;">{{ testimonials.subtitle }}</p>
      <div class="gold-rule mx-auto mt-5"></div>
    </div>
    <div class="grid md:grid-cols-3 gap-6 fade-up">
      {% for t in testimonials.testimonials %}
      <div class="testimonial-card p-8" style="background: var(--section-bg);">
        <i data-lucide="quote" style="width: 28px; height: 28px; color: var(--accent); margin-bottom: 1.25rem; opacity: 0.5;"></i>
        <p class="text-sm mb-6" style="color: var(--text-muted); line-height: 1.8;">{{ t.quote }}</p>
        <div style="border-top: 1px solid rgba(0,0,0,0.06); padding-top: 1rem;">
          <p class="text-sm font-semibold" style="color: var(--text-dark);">{{ t.name }}</p>
          <p class="text-xs" style="color: var(--accent);">{{ t.business }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
