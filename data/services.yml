label: "Services"
title: "Support scaled to <span class=\"text-accent\">your needs</span>"
subtitle: "No two businesses are the same. I tailor every package to fit, whether you need weekly support or a quarterly check-in."
services:
  - title: "Bookkeeping"
    description: "Day-to-day processing of payments, receipts, and reconciliations, keeping your records accurate and HMRC-ready."
    icon: "book-open"
    features:
      - "Sales & purchase ledger"
      - "Bank reconciliation"
      - "Expense categorisation"
      - "Record keeping"
  - title: "Invoicing & Credit Control"
    description: "Professional invoicing and proactive debt chasing so you get paid faster and cash flow stays healthy."
    icon: "file-text"
    features:
      - "Invoice preparation"
      - "Credit control"
      - "Debt chasing"
      - "Statement runs"
  - title: "VAT & Payroll"
    description: "Full VAT return preparation and payroll processing, including RTI submissions and pension contributions."
    icon: "calculator"
    features:
      - "VAT return preparation"
      - "Payroll processing"
      - "RTI submissions"
      - "Auto-enrolment pensions"
  - title: "Cash Flow & Forecasting"
    description: "Cash monitoring, budgeting, and forecasting to help you plan with confidence and avoid surprises."
    icon: "trending-up"
    features:
      - "Cash flow monitoring"
      - "Financial forecasting"
      - "Budget planning"
      - "Management accounts"
  - title: "Tailored Support"
    description: "A flexible package built around your business, on-site or remote, weekly, monthly, or quarterly."
    icon: "heart-handshake"
    features:
      - "Flexible schedule"
      - "On-site or remote"
      - "Your software or mine"
      - "Free initial consultation"
pricing_note: "Charges start at an hourly rate while we get your records up to date, then move to a fixed monthly fee agreed in advance. No surprises, just clarity."
